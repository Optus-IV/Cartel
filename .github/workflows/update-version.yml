name: Update Version on Push

on:
  push:
    branches: [ main ]
    paths:
      - 'Cartel.lua'        # Trigger only when Cartel.lua changes

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Allows the workflow to push changes

      - name: Get current date for patch version (optional)
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Bump version in version.txt
        run: |
          # Read current version (e.g. 1.2.3)
          CURRENT_VERSION=$(cat version.txt | tr -d '\n\r')
          
          # Simple auto-increment patch version (you can customize this logic)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "$NEW_VERSION" > version.txt
          echo "New version: $NEW_VERSION"

      - name: Commit and push updated version.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add version.txt
          git commit -m "chore: auto bump version to $(cat version.txt)" || echo "No changes to commit"
          git push
